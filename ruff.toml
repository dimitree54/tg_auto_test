dummy-variable-rgx = "^__+$|^_[A-Za-z0-9][A-Za-z0-9_]*$"
external = ["DC"]

[lint.flake8-tidy-imports.banned-api]
"unittest" = { msg = "Use pytest instead of unittest for testing" }
"unittest.TestCase" = { msg = "Use pytest classes without inheriting from TestCase" }
"unittest.mock" = { msg = "Use pytest-mock or unittest.mock from pytest" }
"src" = { msg = "Do not import via 'src'; import the package directly (e.g., 'module_name')." }
"__future__" = { msg = "Do not import from __future__" }
"pytest.skip" = { msg = "Test skipping is forbidden. If a test fails, fix it or remove it." }
"pytest.mark.skip" = { msg = "Test skipping is forbidden. If a test fails, fix it or remove it." }
"pytest.mark.skipif" = { msg = "Conditional test skipping is forbidden. If a test fails, fix it or remove it." }
"typing.TYPE_CHECKING" = { msg = "Avoid using if TYPE_CHECKING. Do you really need it here? Maybe without it check will still pass? Maybe you just need to fix circular import?" }
"os.getenv" = { msg = "Use os.environ['KEY'] to ensure the variable is set. Silent fallbacks are not allowed. Fail laudly if unexpected env" }
"os.environ.get" = { msg = "Use os.environ['KEY'] to ensure the variable is set. Silent fallbacks are not allowed. Fail laudly if unexpected env" }
"os.environ.setdefault" = { msg = "Please, let program to fail in case of misconfigured environment - no fallbacks allowed." }
"dict.get" = { msg = "Are you sure that it is approved fallback? Prefer using `[]` to fail laundly if something unexpected happens." }
"typing.Any" = { msg = "Do not use Any. Prefer a concrete type." }
"typing_extensions.Any" = { msg = "Do not use Any. Prefer a concrete type." }
"builtins.object" = { msg = "Do not use `object` as a type. Use a specific type instead." }

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.ruff]
strictly-empty-init-modules = true

[lint.isort]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
force-sort-within-sections = true
combine-as-imports = true
split-on-trailing-comma = true

[lint.per-file-ignores]
"scripts/*" = ["T201", "S603"]