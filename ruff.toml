    "E402",
    "E501",
    "F401",
    "F841",
    "TID251",
    "TID252",
    "T201",
    "T203",
    "T100",
    "ANN001",
    "ANN201",
    "ANN202",
    "ANN204",
    "ANN205",
    "ANN206",
    "ANN401",
    "RUF029",
    "N801",
    "N802",
    "N803",
    "N804",
    "N805",
    "N806",
    "N807",
    "N815",
    "N816",
    "PIE794",
    "PIE796",
    "PYI016",
    "PYI062",
    "PT014",
    "I",
    "PLC0415",
    "S608",
    "S610",
    "S611",
